global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'nabu-api'
    static_configs:
      - targets: ['host.docker.internal:8443']
    metrics_path: '/metrics'

  - job_name: 'nabu-scraper'
    static_configs:
      - targets: ['host.docker.internal:9090']

  - job_name: 'nabu-intelligence'
    static_configs:
      - targets: ['host.docker.internal:9091']

  - job_name: 'postgres'
    static_configs:
      - targets: ['host.docker.internal:9187']

  - job_name: 'redis'
    static_configs:
      - targets: ['host.docker.internal:9121']

  - job_name: 'rabbitmq'
    static_configs:
      - targets: ['host.docker.internal:15692']